name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        shell: pwsh

      - name: Verify runtime
        run: python scripts/verify_runtime.py
        shell: pwsh

  build:
    runs-on: windows-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller
        shell: pwsh

      - name: Build EXE
        run: powershell -ExecutionPolicy Bypass -File scripts\build_exe.ps1

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Build installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc packaging\GitSonar.iss
        shell: pwsh

      - name: Write release manifest
        run: powershell -ExecutionPolicy Bypass -File scripts\write_release_manifest.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dist/GitSonar.exe
            artifacts/dist/installer/GitSonarSetup.exe
            artifacts/dist/release-manifest.json
            artifacts/dist/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
